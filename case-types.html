<meta name="description" content="Every OON specialty has different IDR dynamics. We represent surgeons, anesthesiologists, radiologists, ASCs, emergency medicine groups, and more in NY IDR and federal No Surprises Act arbitration.">

<style>
:root{--white:#FFFFFF;--off-white:#F8FAFB;--steel:#1B4F72;--steel-mid:#2E86AB;--steel-light:#EBF4F8;--steel-xlight:#F0F7FB;--charcoal:#0F1923;--gray-dark:#374151;--gray-mid:#6B7280;--gray-light:#F3F4F6;--gold:#C9A84C;--border:#D9E6EE;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--radius:4px;--shadow:0 2px 16px rgba(27,79,114,0.08);--shadow-lg:0 8px 40px rgba(27,79,114,0.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--gray-dark);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:68px;}
.nav-logo{font-family:var(--serif);font-size:1.55rem;color:var(--steel);text-decoration:none;letter-spacing:-0.01em;line-height:1.1;display:inline-flex;flex-direction:column;align-items:flex-start;}
.nav-logo-brand{display:inline;}
.nav-logo-ny{color:var(--steel-mid);}
.nav-logo-sub{font-family:var(--sans);font-size:0.6rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray-mid);margin-top:1px;}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-size:0.875rem;font-weight:500;color:var(--gray-dark);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--steel);}
.nav-cta{background:var(--steel);color:var(--white)!important;padding:9px 20px;border-radius:var(--radius);font-weight:600!important;transition:background 0.2s!important;}
.nav-cta:hover{background:var(--charcoal)!important;}
.hamburger{display:none;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--charcoal);margin:5px 0;}

/* PAGE HERO */
.page-hero{background:var(--charcoal);padding:140px 24px 72px;}
.page-hero-inner{max-width:1180px;margin:0 auto;}
.page-eyebrow{font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.page-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.page-hero h1{font-family:var(--serif);font-size:clamp(1.9rem,4vw,3rem);color:var(--white);letter-spacing:-0.02em;line-height:1.1;margin-bottom:16px;}
.page-hero p{font-size:1rem;color:rgba(255,255,255,0.6);max-width:600px;line-height:1.7;}

/* TRUST BAR */
.trust-bar{background:var(--steel);padding:14px 24px;}
.trust-bar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:40px;flex-wrap:wrap;}
.trust-item{display:flex;align-items:center;gap:8px;font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.85);white-space:nowrap;}
.trust-dot{width:5px;height:5px;background:var(--steel-mid);border-radius:50%;flex-shrink:0;}

/* SECTION BASE */
section{padding:88px 24px;}
.container{max-width:1180px;margin:0 auto;}
.section-eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.section-title{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--charcoal);letter-spacing:-0.02em;line-height:1.15;margin-bottom:16px;}
.section-sub{font-size:1.05rem;color:var(--gray-mid);line-height:1.7;max-width:620px;}

/* INTRO SECTION */
.intro-section{background:var(--off-white);border-bottom:1px solid var(--border);}
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:48px;}
.intro-stat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:28px;text-align:center;}
.intro-stat-num{font-family:var(--serif);font-size:2.4rem;color:var(--steel);line-height:1;margin-bottom:6px;}
.intro-stat-num span{font-size:1.2rem;color:var(--steel-mid);}
.intro-stat-label{font-size:0.82rem;color:var(--gray-mid);line-height:1.4;}
.intro-note{font-size:0.78rem;color:var(--gray-mid);line-height:1.5;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* CASE TYPE CARDS */
.cases-section{background:var(--white);}
.cases-grid{display:flex;flex-direction:column;gap:2px;margin-top:48px;}
.case-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow 0.2s;}
.case-card:hover{box-shadow:var(--shadow-lg);}
.case-header{display:grid;grid-template-columns:64px 1fr auto;align-items:center;gap:24px;padding:28px 32px;cursor:pointer;background:var(--white);transition:background 0.15s;}
.case-header:hover{background:var(--steel-xlight);}
.case-icon{width:48px;height:48px;background:var(--steel-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.case-title-block{}
.case-title{font-family:var(--serif);font-size:1.2rem;color:var(--charcoal);margin-bottom:4px;}
.case-tags{display:flex;gap:8px;flex-wrap:wrap;}
.tag{font-size:0.65rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.tag-ny{background:#FFF3CD;color:#856404;}
.tag-fed{background:#D1ECF1;color:#0C5460;}
.tag-both{background:var(--steel-light);color:var(--steel);}
.tag-hot{background:rgba(201,168,76,0.15);color:#8B6914;}
.case-chevron{font-size:1.2rem;color:var(--gray-mid);transition:transform 0.2s;flex-shrink:0;}
.case-card.open .case-chevron{transform:rotate(180deg);}
.case-card.open .case-header{background:var(--steel-xlight);}
.case-body{display:none;padding:0 32px 32px;border-top:1px solid var(--border);}
.case-card.open .case-body{display:block;}
.case-body-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding-top:28px;}
.case-detail-block h4{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:10px;}
.case-detail-block p{font-size:0.875rem;color:var(--gray-mid);line-height:1.7;}
.case-detail-block ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.case-detail-block li{font-size:0.875rem;color:var(--gray-dark);display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.case-detail-block li::before{content:'→';color:var(--steel-mid);font-weight:700;flex-shrink:0;margin-top:1px;}
.case-strategy{background:var(--steel-xlight);border-radius:6px;padding:16px 20px;margin-top:20px;font-size:0.875rem;color:var(--steel);line-height:1.6;}
.case-strategy strong{font-weight:700;}

/* ERISA SECTION */
.erisa-section{background:var(--charcoal);}
.erisa-section .section-title{color:var(--white);}
.erisa-section .section-eyebrow{color:rgba(255,255,255,0.5);}
.erisa-section .section-eyebrow::before{background:rgba(255,255,255,0.3);}
.erisa-section .section-sub{color:rgba(255,255,255,0.6);}
.erisa-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:48px;}
.erisa-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:28px;}

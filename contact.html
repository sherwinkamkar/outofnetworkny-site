<style>
:root{--white:#FFFFFF;--off-white:#F8FAFB;--steel:#1B4F72;--steel-mid:#2E86AB;--steel-light:#EBF4F8;--charcoal:#0F1923;--gray-dark:#374151;--gray-mid:#6B7280;--border:#D9E6EE;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--radius:4px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--gray-dark);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:68px;}
.nav-logo{font-family:var(--serif);font-size:1.55rem;color:var(--steel);text-decoration:none;letter-spacing:-0.01em;line-height:1.1;display:inline-flex;flex-direction:column;align-items:flex-start;}.nav-logo-brand{display:inline;}
.nav-logo-ny{color:var(--steel-mid);}.nav-logo-sub{font-family:var(--sans);font-size:0.6rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray-mid);margin-top:1px;}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-size:0.875rem;font-weight:500;color:var(--gray-dark);text-decoration:none;}
.nav-cta{background:var(--steel);color:var(--white)!important;padding:9px 20px;border-radius:var(--radius);font-weight:600!important;}
.hamburger{display:none;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--charcoal);margin:5px 0;}
.page-hero{background:var(--charcoal);padding:140px 24px 72px;}
.page-hero-inner{max-width:1180px;margin:0 auto;}
.page-eyebrow{font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.page-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.page-hero h1{font-family:var(--serif);font-size:clamp(1.9rem,4vw,3rem);color:var(--white);letter-spacing:-0.02em;line-height:1.1;margin-bottom:16px;}
.page-hero p{font-size:1rem;color:rgba(255,255,255,0.6);max-width:560px;line-height:1.7;}
section{padding:72px 24px;}
.container{max-width:1180px;margin:0 auto;}
.contact-grid{display:grid;grid-template-columns:1fr 420px;gap:64px;align-items:start;}
.about-section{margin-bottom:40px;}
.section-eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.section-title{font-family:var(--serif);font-size:clamp(1.5rem,3vw,2.2rem);color:var(--charcoal);letter-spacing:-0.02em;line-height:1.15;margin-bottom:16px;}
.about-body p{font-size:0.9rem;color:var(--gray-mid);line-height:1.75;margin-bottom:14px;}
.firm-details{background:var(--off-white);border:1px solid var(--border);border-radius:8px;padding:28px;margin-top:28px;}
.firm-details h3{font-family:var(--serif);font-size:1.1rem;color:var(--charcoal);margin-bottom:20px;}
.detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-size:0.78rem;font-weight:700;color:var(--gray-mid);width:80px;flex-shrink:0;padding-top:2px;}
.detail-val{font-size:0.875rem;color:var(--gray-dark);}
.detail-val a{color:var(--steel-mid);text-decoration:none;}
.contact-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:32px;box-shadow:0 4px 24px rgba(27,79,114,0.08);position:sticky;top:88px;}
.contact-card h2{font-family:var(--serif);font-size:1.4rem;color:var(--charcoal);margin-bottom:6px;}
.contact-card .sub{font-size:0.85rem;color:var(--gray-mid);margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--gray-dark);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:0.875rem;color:var(--charcoal);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--steel-mid);box-shadow:0 0 0 3px rgba(46,134,171,0.1);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-submit{width:100%;padding:13px;background:var(--steel);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--sans);font-size:0.9rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
.form-submit:hover{background:var(--charcoal);}
.privacy{font-size:0.72rem;color:var(--gray-mid);text-align:center;margin-top:10px;line-height:1.4;}
.portfolio-section{background:var(--off-white);border-top:1px solid var(--border);}
.portfolio-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px;}
.portfolio-item{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:20px;text-align:center;}
.portfolio-item a{font-size:0.875rem;font-weight:600;color:var(--steel);text-decoration:none;}
.portfolio-item a:hover{text-decoration:underline;}
.portfolio-item p{font-size:0.78rem;color:var(--gray-mid);margin-top:4px;}
footer{background:var(--charcoal);padding:24px;}
.footer-bottom{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
.footer-legal{font-size:0.72rem;color:rgba(255,255,255,0.3);line-height:1.6;max-width:640px;}
.footer-copy{font-size:0.75rem;color:rgba(255,255,255,0.3);}
@media(max-width:900px){.contact-grid{grid-template-columns:1fr;}.contact-card{position:static;}}
@media(max-width:768px){
  .nav-links{display:none;}.hamburger{display:block;}
  .nav-links.open{display:flex;flex-direction:column;position:fixed;top:68px;left:0;right:0;background:var(--white);padding:20px 24px;border-bottom:1px solid var(--border);gap:4px;}
  .portfolio-grid{grid-template-columns:1fr 1fr;}
}

<style>
:root{--white:#FFFFFF;--off-white:#F8FAFB;--steel:#1B4F72;--steel-mid:#2E86AB;--steel-light:#EBF4F8;--charcoal:#0F1923;--gray-dark:#374151;--gray-mid:#6B7280;--gray-light:#F3F6F9;--gold:#C9A84C;--border:#D9E6EE;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--radius:4px;--shadow:0 2px 16px rgba(27,79,114,0.08);}

.nav-logo-brand{display:inline;}.nav-logo-ny{color:var(--steel-mid);}.nav-logo-sub{font-family:var(--sans);font-size:0.6rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray-mid);margin-top:1px;}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-size:0.875rem;font-weight:500;color:var(--gray-dark);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--steel);}
.nav-cta{background:var(--steel);color:var(--white)!important;padding:9px 20px;border-radius:var(--radius);font-weight:600!important;}

.page-hero{background:var(--charcoal);padding:140px 24px 80px;position:relative;overflow:hidden;}

.page-hero h1{font-family:var(--serif);font-size:clamp(1.9rem,4vw,3rem);color:var(--white);letter-spacing:-0.02em;line-height:1.1;margin-bottom:20px;max-width:700px;}

/* TABS */
.tabs-section{padding:0;background:var(--off-white);border-bottom:1px solid var(--border);}
.tabs-inner{max-width:1180px;margin:0 auto;display:flex;gap:0;}
.tab-btn{padding:18px 32px;font-family:var(--sans);font-size:0.875rem;font-weight:600;color:var(--gray-mid);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;}
.tab-btn.active{color:var(--steel);border-bottom-color:var(--steel);}
.tab-btn:hover{color:var(--charcoal);}
/* CONTENT */

.container{max-width:1180px;margin:0 auto;}

.tab-content.active{display:block;}
.section-eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.section-title{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.3rem);color:var(--charcoal);letter-spacing:-0.02em;line-height:1.15;margin-bottom:16px;}
.section-sub{font-size:1rem;color:var(--gray-mid);line-height:1.7;max-width:680px;margin-bottom:48px;}
/* TIMELINE */
.timeline{position:relative;}
.timeline::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:1px;background:var(--border);}
.tl-step{display:flex;gap:28px;padding-bottom:40px;}
.tl-step:last-child{padding-bottom:0;}
.tl-marker{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:2;font-weight:700;font-size:0.875rem;}
.tl-marker.ny{background:var(--steel);color:var(--white);}
.tl-marker.fed{background:#2D6A4F;color:var(--white);}
.tl-marker.both{background:var(--charcoal);color:var(--white);}
.tl-body{padding-top:10px;}
.tl-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.badge-ny{background:#FFF3CD;color:#856404;}
.badge-fed{background:#D4EDDA;color:#155724;}
.badge-both{background:var(--steel-light);color:var(--steel);}
.badge-warn{background:#F8D7DA;color:#721C24;}
.tl-title{font-family:var(--serif);font-size:1.15rem;color:var(--charcoal);margin-bottom:8px;}
.tl-desc{font-size:0.875rem;color:var(--gray-mid);line-height:1.65;margin-bottom:10px;}
.tl-detail{background:var(--off-white);border-left:3px solid var(--steel-mid);padding:12px 16px;border-radius:0 4px 4px 0;margin-top:10px;}
.tl-detail p{font-size:0.82rem;color:var(--gray-dark);line-height:1.6;}
.tl-cite{font-size:0.72rem;color:var(--gray-mid);margin-top:6px;font-style:italic;}
/* COMPARISON TABLE */
.compare-wrap{margin-top:48px;}
.compare-title{font-family:var(--serif);font-size:1.3rem;color:var(--charcoal);margin-bottom:24px;}
.compare-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.compare-table th{padding:12px 16px;text-align:left;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray-mid);border-bottom:2px solid var(--border);}
.compare-table th:first-child{width:30%;}
.compare-table th.ny-col{color:var(--steel);}
.compare-table th.fed-col{color:#155724;}
.compare-table td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table tr:hover td{background:var(--steel-xlight,#F0F7FB);}
.compare-table .row-label{font-weight:600;color:var(--charcoal);}
.win{color:#155724;font-weight:600;}

.factors-section{background:var(--steel);padding:64px 24px;}
.factors-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:40px;}

.factor-list{display:flex;flex-direction:column;gap:8px;}
.factor-item{display:flex;align-items:flex-start;gap:10px;font-size:0.85rem;color:rgba(255,255,255,1);}
.factor-dot{width:6px;height:6px;border-radius:50%;background:var(--steel-mid);flex-shrink:0;margin-top:6px;}
.factor-item.excluded{color:rgba(255,255,255,0.75);text-decoration:none;}
.factor-item.excluded .factor-dot{background:rgba(255,255,255,0.2);}

.deadline-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px;}
.deadline-card{padding:24px;border-radius:8px;border:1px solid var(--border);}

<style>
:root {
  --white: #FFFFFF;
  --off-white: #F8FAFB;
  --steel: #1B4F72;
  --steel-mid: #2E86AB;
  --steel-light: #EBF4F8;
  --steel-xlight: #F0F7FB;
  --charcoal: #0F1923;
  --gray-dark: #374151;
  --gray-mid: #6B7280;
  --gray-light: #F3F6F9;
  --gold: #C9A84C;
  --border: #D9E6EE;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --radius: 4px;
  --shadow: 0 2px 16px rgba(27,79,114,0.08);
  --shadow-lg: 0 8px 40px rgba(27,79,114,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  color: var(--gray-dark);
  background: var(--white);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
}
.nav-inner {
  max-width: 1180px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 68px;
}
.nav-logo {
  font-family: var(--serif);
  font-size: 1.55rem;
  color: var(--steel);
  text-decoration: none;
  letter-spacing: -0.01em;
  line-height: 1.1;
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
}
.nav-logo-brand { display: inline; }
.nav-logo-ny { color: var(--steel-mid); }
.nav-logo-sub { font-family: var(--sans); font-size: 0.6rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-mid); margin-top: 1px; }
.nav-links {
  display: flex; align-items: center; gap: 32px; list-style: none;
}
.nav-links a {
  font-size: 0.875rem; font-weight: 500;
  color: var(--gray-dark); text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--steel); }
.nav-cta {
  background: var(--steel);
  color: var(--white) !important;
  padding: 9px 20px;
  border-radius: var(--radius);
  font-weight: 600 !important;
  transition: background 0.2s !important;
}
.nav-cta:hover { background: var(--charcoal) !important; color: var(--white) !important; }
.hamburger { display: none; cursor: pointer; background: none; border: none; padding: 4px; }
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--charcoal); margin: 5px 0;
  transition: all 0.3s;
}

/* ─── HERO ─── */
.hero {
  min-height: 92vh;
  background: var(--charcoal);
  padding-top: 68px;
  display: flex; align-items: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(46,134,171,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 80% at 10% 80%, rgba(27,79,114,0.25) 0%, transparent 50%);
}
.hero-grid {
  position: absolute; inset: 0; opacity: 0.04;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-inner {
  max-width: 1180px; margin: 0 auto; padding: 80px 24px;
  position: relative; z-index: 2;
  display: grid; grid-template-columns: 1fr 420px; gap: 64px; align-items: center;
}
.hero-eyebrow {
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--steel-mid);
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.hero-eyebrow::before {
  content: ''; display: block; width: 28px; height: 1px; background: var(--steel-mid);
}
.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  line-height: 1.1;
  color: var(--white);
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}
.hero h1 em {
  font-style: italic; color: var(--steel-mid);
}
.hero-sub {
  font-size: 1.1rem; color: rgba(255,255,255,0.72);
  max-width: 540px; line-height: 1.7;
  margin-bottom: 36px;
}
.hero-actions {
  display: flex; gap: 14px; flex-wrap: wrap;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--steel-mid);
  color: var(--white);
  padding: 14px 28px;
  border-radius: var(--radius);
  font-weight: 600; font-size: 0.95rem;
  text-decoration: none;
  transition: background 0.2s, transform 0.15s;
  border: none; cursor: pointer;
}
.btn-primary:hover { background: #2278A3; transform: translateY(-1px); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  color: rgba(255,255,255,0.85);
  padding: 14px 28px;
  border-radius: var(--radius);
  font-weight: 500; font-size: 0.95rem;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.25);
  transition: all 0.2s;
  cursor: pointer;
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.5);
}

/* Hero card */
.hero-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 32px;
  backdrop-filter: blur(4px);
}
.hero-card-title {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--steel-mid);
  margin-bottom: 20px;
}
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.stat-item { padding: 16px; background: rgba(255,255,255,0.05); border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); }
.stat-num {
  font-family: var(--serif); font-size: 2rem; color: var(--white);
  line-height: 1; margin-bottom: 4px;
}
.stat-num span { font-size: 1.1rem; color: var(--steel-mid); }
.stat-label { font-size: 0.72rem; color: rgba(255,255,255,0.5); line-height: 1.3; }
.hero-card-divider {
  height: 1px; background: rgba(255,255,255,0.08); margin: 20px 0;
}
.hero-card-footnote {
  font-size: 0.72rem; color: rgba(255,255,255,0.4); line-height: 1.5;
}

/* ─── TRUST BAR ─── */
.trust-bar {
  background: var(--steel);
  padding: 16px 24px;
}
.trust-bar-inner {
  max-width: 1180px; margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  gap: 40px; flex-wrap: wrap;
}
.trust-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.85);
  white-space: nowrap;
}
.trust-dot { width: 5px; height: 5px; background: var(--steel-mid); border-radius: 50%; flex-shrink: 0; }

/* ─── SECTION BASE ─── */
section { padding: 88px 24px; }
.container { max-width: 1180px; margin: 0 auto; }
.section-eyebrow {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--steel-mid);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-eyebrow::before {
  content: ''; display: block; width: 20px; height: 1px; background: var(--steel-mid);
}
.section-title {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  color: var(--charcoal);
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 16px;
}

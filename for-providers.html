<style>
:root {
  --white:#FFFFFF; --off-white:#F8FAFB; --steel:#1B4F72; --steel-mid:#2E86AB;
  --steel-light:#EBF4F8; --charcoal:#0F1923; --gray-dark:#374151;
  --gray-mid:#6B7280; --gray-light:#F3F6F9; --gold:#C9A84C;
  --border:#D9E6EE; --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif; --radius:4px;
  --shadow:0 2px 16px rgba(27,79,114,0.08); --shadow-lg:0 8px 40px rgba(27,79,114,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--gray-dark);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.nav-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:68px;}
.nav-logo{font-family:var(--serif);font-size:1.55rem;color:var(--steel);text-decoration:none;letter-spacing:-0.01em;line-height:1.1;display:inline-flex;flex-direction:column;align-items:flex-start;}.nav-logo-brand{display:inline;}
.nav-logo-ny{color:var(--steel-mid);}.nav-logo-sub{font-family:var(--sans);font-size:0.6rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--gray-mid);margin-top:1px;}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-size:0.875rem;font-weight:500;color:var(--gray-dark);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--steel);}
.nav-cta{background:var(--steel);color:var(--white)!important;padding:9px 20px;border-radius:var(--radius);font-weight:600!important;}
.nav-cta:hover{background:var(--charcoal)!important;}
.hamburger{display:none;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--charcoal);margin:5px 0;}
/* PAGE HERO */
.page-hero{background:var(--charcoal);padding:140px 24px 80px;position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 80% 30%,rgba(46,134,171,0.15) 0%,transparent 60%);}
.page-hero-inner{max-width:1180px;margin:0 auto;position:relative;z-index:2;}
.page-eyebrow{font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.page-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.page-hero h1{font-family:var(--serif);font-size:clamp(2rem,4.5vw,3.2rem);color:var(--white);letter-spacing:-0.02em;line-height:1.1;margin-bottom:20px;max-width:720px;}
.page-hero p{font-size:1.05rem;color:rgba(255,255,255,0.65);max-width:600px;line-height:1.7;}
/* SECTIONS */
section{padding:72px 24px;}
.container{max-width:1180px;margin:0 auto;}
.section-eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--steel-mid);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--steel-mid);}
.section-title{font-family:var(--serif);font-size:clamp(1.7rem,3vw,2.4rem);color:var(--charcoal);letter-spacing:-0.02em;line-height:1.15;margin-bottom:16px;}
.section-sub{font-size:1rem;color:var(--gray-mid);line-height:1.7;max-width:600px;}
/* PROBLEM */
.problem-section{background:var(--off-white);}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:48px;}
.problem-points{display:flex;flex-direction:column;gap:20px;}
.problem-point{display:flex;gap:16px;align-items:flex-start;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:6px;}
.problem-icon{font-size:1.4rem;flex-shrink:0;}
.problem-point h4{font-family:var(--serif);font-size:1rem;color:var(--charcoal);margin-bottom:5px;}
.problem-point p{font-size:0.85rem;color:var(--gray-mid);line-height:1.6;}
.problem-quote{background:var(--steel);border-radius:8px;padding:36px;position:sticky;top:88px;}
.pq-text{font-family:var(--serif);font-size:1.4rem;color:var(--white);line-height:1.4;margin-bottom:20px;font-style:italic;}
.pq-stat{font-size:0.8rem;color:rgba(255,255,255,0.5);border-top:1px solid rgba(255,255,255,0.1);padding-top:16px;}
.pq-num{font-family:var(--serif);font-size:2.4rem;color:var(--steel-mid);line-height:1;margin-bottom:4px;}
/* WHAT WE DO */
.what-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;}
.what-card{border:1px solid var(--border);border-radius:8px;padding:28px;background:var(--white);}
.what-num{font-family:var(--serif);font-size:2rem;color:var(--steel-light);line-height:1;margin-bottom:12px;}
.what-card h3{font-family:var(--serif);font-size:1.1rem;color:var(--charcoal);margin-bottom:10px;}
.what-card p{font-size:0.875rem;color:var(--gray-mid);line-height:1.65;}
/* SPECIALTIES */
.spec-section{background:var(--off-white);}
.spec-accordion{display:flex;flex-direction:column;gap:12px;margin-top:40px;}
.spec-item{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.spec-header-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:none;border:none;cursor:pointer;font-family:var(--sans);text-align:left;}
.spec-header-left{display:flex;align-items:center;gap:14px;}
.spec-emoji-sm{font-size:1.1rem;}
.spec-header-title{font-size:0.95rem;font-weight:600;color:var(--charcoal);}
.spec-header-sub{font-size:0.8rem;color:var(--gray-mid);}
.spec-chevron{color:var(--steel-mid);transition:transform 0.3s;font-size:1rem;}
.spec-item.open .spec-chevron{transform:rotate(180deg);}
.spec-body{display:none;padding:0 24px 20px;}
.spec-item.open .spec-body{display:block;}
.spec-body-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.spec-tip h5{font-size:0.78rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--steel);margin-bottom:6px;}
.spec-tip ul{padding-left:16px;font-size:0.85rem;color:var(--gray-mid);line-height:1.7;}
/* FEES */
.fees-section{background:var(--white);}
.fees-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:40px;}
.fee-card{border-radius:8px;padding:28px;text-align:center;}
.fee-card.highlight{background:var(--steel);color:var(--white);}
.fee-card.regular{background:var(--off-white);border:1px solid var(--border);}
.fee-title{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.fee-card.highlight .fee-title{color:rgba(255,255,255,0.6);}
.fee-card.regular .fee-title{color:var(--gray-mid);}
.fee-amount{font-family:var(--serif);font-size:2rem;margin-bottom:8px;line-height:1;}
.fee-card.highlight .fee-amount{color:var(--white);}
.fee-card.regular .fee-amount{color:var(--charcoal);}
.fee-desc{font-size:0.82rem;line-height:1.5;}
.fee-card.highlight .fee-desc{color:rgba(255,255,255,0.6);}
.fee-card.regular .fee-desc{color:var(--gray-mid);}
/* CTA */
.cta-bar{background:linear-gradient(135deg,var(--charcoal) 0%,var(--steel) 100%);padding:64px 24px;text-align:center;}
.cta-bar h2{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.4rem);color:var(--white);margin-bottom:14px;}
